{% extends "base.html" %} {% block content %}
<div class="settings-container">
  <h1>Settings</h1>

  <!-- Profile Information Section -->
  <section class="settings-section">
    <h2>Profile Information</h2>

    <!-- Name Display and Edit -->
    <div class="info-item">
      <div class="info-display">
        <label>Name</label>
        <div class="info-value">
          <span id="nameDisplay">{{ user.name }}</span>
        </div>
        <button class="edit-btn" onclick="toggleEdit('name')">Edit</button>
      </div>
      <div class="info-edit" id="nameEdit" style="display: none">
        <form class="edit-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              value="{{ user.name }}"
              required
            />
          </div>
          <div class="form-actions">
            <button type="button" class="save-btn" onclick="saveName()">
              Save
            </button>
            <button
              type="button"
              class="cancel-btn"
              onclick="toggleEdit('name')"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Email Display and Edit -->
    <div class="info-item">
      <div class="info-display">
        <label>Email</label>
        <div class="info-value">
          <span id="emailDisplay">{{ user.email }}</span>
        </div>
        <button class="edit-btn" onclick="toggleEdit('email')">Change</button>
      </div>
      <div class="info-edit" id="emailEdit" style="display: none">
        <form class="edit-form">
          <div class="form-group">
            <label for="newEmail">New Email</label>
            <input
              type="email"
              id="newEmail"
              name="newEmail"
              value="{{ user.email }}"
              required
            />
          </div>
          <div class="form-actions">
            <button type="button" class="save-btn" onclick="saveEmail()">
              Save
            </button>
            <button
              type="button"
              class="cancel-btn"
              onclick="toggleEdit('email')"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Password Change -->
    <div class="info-item">
      <div class="info-display">
        <label>Password</label>
        <div class="info-value">
          <span>••••••••</span>
        </div>
        <button class="edit-btn" onclick="toggleEdit('password')">
          Change
        </button>
      </div>
      <div class="info-edit" id="passwordEdit" style="display: none">
        <form class="edit-form">
          <div class="form-group">
            <label for="currentPassword">Current Password</label>
            <input
              type="password"
              id="currentPassword"
              name="currentPassword"
              required
            />
          </div>
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input
              type="password"
              id="newPassword"
              name="newPassword"
              required
            />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm New Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              required
            />
          </div>
          <div class="form-actions">
            <button type="button" class="save-btn" onclick="savePassword()">
              Save
            </button>
            <button
              type="button"
              class="cancel-btn"
              onclick="toggleEdit('password')"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Account Actions Section -->
  <section class="settings-section">
    <h2>Account Actions</h2>

    <button
      class="action-btn notification-btn"
      onclick="openNotificationSettings()"
    >
      Notification Settings
    </button>

    <button class="action-btn logout-btn" onclick="logout()">Log Out</button>

    <button class="action-btn delete-btn" onclick="deleteAccount()">
      Delete Account
    </button>
  </section>
</div>

<script>
  // User data from backend
  let userData = {
    name: "{{ user.name }}",
    email: "{{ user.email }}",
  };

  function toggleEdit(type) {
    const editDiv = document.getElementById(type + "Edit");
    const displayDiv = editDiv.previousElementSibling;

    if (editDiv.style.display === "none") {
      editDiv.style.display = "block";
      displayDiv.style.display = "none";
    } else {
      editDiv.style.display = "none";
      displayDiv.style.display = "block";
    }
  }

  function showMessage(text, isError = false) {
    const messageDisplay = document.getElementById("messageDisplay");
    const messageText = document.getElementById("messageText");
    messageText.textContent = text;
    messageDisplay.style.display = "flex";

    // Add error styling if needed
    if (isError) {
      messageDisplay.style.backgroundColor = "#f44336";
    } else {
      messageDisplay.style.backgroundColor = "#4caf50";
    }

    // Hide message after 3 seconds
    setTimeout(() => {
      messageDisplay.style.display = "none";
    }, 3000);
  }

  async function saveName() {
    const name = document.getElementById("name").value.trim();

    if (!name) {
      showMessage("Name cannot be empty!", true);
      return;
    }

    try {
      const response = await fetch("/api/update-name", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ name: name }),
      });

      const data = await response.json();

      if (data.success) {
        // Update display
        document.getElementById("nameDisplay").textContent = name;
        userData.name = name;

        // Hide edit form
        toggleEdit("name");

        showMessage(data.message || "Name updated successfully!");
      } else {
        showMessage(data.message || "Failed to update name", true);
      }
    } catch (error) {
      showMessage("Error updating name. Please try again.", true);
      console.error("Error:", error);
    }
  }

  async function saveEmail() {
    const newEmail = document.getElementById("newEmail").value.trim();

    if (!newEmail) {
      showMessage("Email cannot be empty!", true);
      return;
    }

    try {
      const response = await fetch("/api/update-email", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ email: newEmail }),
      });

      const data = await response.json();

      if (data.success) {
        // Update display
        document.getElementById("emailDisplay").textContent = newEmail;
        userData.email = newEmail;

        // Hide edit form
        toggleEdit("email");

        showMessage(data.message || "Email updated successfully!");
      } else {
        showMessage(data.message || "Failed to update email", true);
      }
    } catch (error) {
      showMessage("Error updating email. Please try again.", true);
      console.error("Error:", error);
    }
  }

  async function savePassword() {
    const currentPassword = document.getElementById("currentPassword").value;
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (newPassword !== confirmPassword) {
      showMessage("New passwords do not match!", true);
      return;
    }

    if (newPassword.length < 6) {
      showMessage("Password must be at least 6 characters long!", true);
      return;
    }

    try {
      const response = await fetch("/api/update-password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          currentPassword: currentPassword,
          newPassword: newPassword,
          confirmPassword: confirmPassword,
        }),
      });

      const data = await response.json();

      if (data.success) {
        // Clear form
        document.getElementById("currentPassword").value = "";
        document.getElementById("newPassword").value = "";
        document.getElementById("confirmPassword").value = "";

        // Hide edit form
        toggleEdit("password");

        showMessage(data.message || "Password updated successfully!");
      } else {
        showMessage(data.message || "Failed to update password", true);
      }
    } catch (error) {
      showMessage("Error updating password. Please try again.", true);
      console.error("Error:", error);
    }
  }

  function openNotificationSettings() {
    // TODO: Implement notification settings
  }

  function logout() {
    window.location.href = "{{ url_for('logout') }}";
  }

  async function deleteAccount() {
    try {
      const response = await fetch("/api/delete-account", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
      });

      const data = await response.json();

      if (data.success) {
        showMessage(
          data.message || "Account deleted successfully, logging out...",
        );
        // Redirect to login page after a short delay
        setTimeout(() => {
          window.location.href = "{{ url_for('login') }}";
        }, 1500);
      } else {
        showMessage(data.message || "Failed to delete account", true);
      }
    } catch (error) {
      showMessage("Error deleting account. Please try again.", true);
      console.error("Error:", error);
    }
  }
</script>
{% endblock %}
