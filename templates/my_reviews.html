{% extends "base.html" %} {% block content %}
<h1>My Reviews</h1>
{% if reviews %} {% for review in reviews %}
<div class="movie-card">
  <p>Rating: {{ review.stars }} ⭐</p>
  <p>{{ review.comment }}</p>
</div>
{% endfor %} {% else %}
<p>You haven't reviewed any movies yet.</p>
{% endif %} {% endblock %}
